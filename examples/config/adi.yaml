artifact:
  templates_dir: templates
execution:
  worktree_root: ~/agent-worktrees
  default_timeout_seconds: 1200
  verification_fix_cycles: 2
  total_task_attempts: 3
  max_active_runs_global: 2
  max_active_runs_per_repo: 2
verification:
  default_checks:
    - test
    - lint
    - typecheck
    - build
